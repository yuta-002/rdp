name: Windows CI Build Environment - Master Yuta Edition

on:
  workflow_dispatch:
  repository_dispatch:
    types: [restart_rdp]

jobs:
  build-and-test:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:
      - name: 🚀 Initialize High-Performance & Optimization
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force
          powercfg /s 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c
          netsh advfirewall firewall add rule name="RDP-Port" dir=in action=allow protocol=TCP localport=3389
          Restart-Service -Name TermService -Force

      - name: 👤 Create Single Admin & Branding
        run: |
          # [FINAL FIX] Guaranteed Complexity Policy Compliance
          $Upper = (65..90) | Get-Random -Count 3 | ForEach-Object {[char]$_}
          $Lower = (97..122) | Get-Random -Count 3 | ForEach-Object {[char]$_}
          $Nums  = (48..57) | Get-Random -Count 3 | ForEach-Object {[char]$_}
          $Special = 33, 35, 36 | Get-Random -Count 1 | ForEach-Object {[char]$_}
          $RandomPart = -join ($Upper + $Lower + $Nums + $Special | Sort-Object {Get-Random})
          
          # Final 14 Digit Password: Yuta + 10 Random (Complexity Guaranteed)
          $password = "Yuta" + $RandomPart
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          
          # Create MasterYuta Admin
          New-LocalUser -Name "MasterYuta" -Password $securePass -FullName "YUTA Admin" -Description "Managed by @JOY_100K" -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "MasterYuta"
          
          # OEM Branding
          $Path = "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\OEMInformation"
          if (!(Test-Path $Path)) { New-Item -Path $Path -Force }
          Set-ItemProperty -Path $Path -Name "Manufacturer" -Value "YUTA 複 CI/CD Labs" -Force
          Set-ItemProperty -Path $Path -Name "SupportURL" -Value "https://t.me/JOY_100K" -Force
          Set-ItemProperty -Path $Path -Name "Model" -Value "Ultra Pro Jarvis Mode" -Force

          echo "RDP_USER=MasterYuta" >> $env:GITHUB_ENV
          echo "RDP_PASS=$password" >> $env:GITHUB_ENV
          echo "OS_INFO=$((Get-WmiObject Win32_OperatingSystem).Caption)" >> $env:GITHUB_ENV
          echo "CPU_INFO=$((Get-WmiObject Win32_Processor).Name)" >> $env:GITHUB_ENV
          $totalRam = [math]::Round((Get-CimInstance Win32_PhysicalMemory | Measure-Object Capacity -Sum).Sum / 1GB)
          echo "TOTAL_RAM=$totalRam" >> $env:GITHUB_ENV

      - name: 🛡️ Set Owner Watermark (Legal Notice)
        run: |
          $regPath = "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System"
          Set-ItemProperty -Path $regPath -Name "legalnoticecaption" -Value "🚀 RDP OWNER: YUTA 複" -Force
          Set-ItemProperty -Path $regPath -Name "legalnoticetext" -Value "This RDP is managed by YUTA 複.`nTelegram: @JOY_100K" -Force

      - name: 🔗 Tailscale Connection
        run: |
          Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi" -OutFile "ts.msi"
          Start-Process msiexec.exe -ArgumentList "/i", "ts.msi", "/quiet", "/norestart" -Wait
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=ultra-rdp-${{ github.run_id }}
          $tsIP = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV

      - name: 🎙️ Jarvis Voice Greeting Setup
        run: |
          $VoiceScript = @"
          Add-Type -AssemblyName System.Speech
          `$speak = New-Object System.Speech.Synthesis.SpeechSynthesizer
          `$speak.Speak('Welcome master Yuta, your system is ready and secure.')
          "@
          $VoiceScript | Out-File "C:\Users\Public\JarvisVoice.ps1" -Encoding utf8
          $RegPath = "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Run"
          Set-ItemProperty -Path $RegPath -Name "JarvisVoice" -Value "powershell.exe -WindowStyle Hidden -File C:\Users\Public\JarvisVoice.ps1" -Force

      - name: 📝 Generate Login Details File
        run: |
          $details = @"
          =========================================
          👑 OWNER: YUTA 複 | @JOY_100K
          =========================================
          🌐 NETWORK INFO:
          IP: $($env:TAILSCALE_IP)
          User: MasterYuta
          Pass: $($env:RDP_PASS)
          
          💻 SYSTEM SPECS:
          OS: $($env:OS_INFO)
          CPU: $($env:CPU_INFO)
          RAM: $($env:TOTAL_RAM)GB
          =========================================
          "@
          $details | Out-File "C:\Users\Public\Desktop\MASTER_YUTA_INFO.txt" -Encoding utf8

      - name: 🖼️ Set Branded Wallpaper
        run: |
          $wpUrl = "https://i.imgur.com/G4lU8jL.jpg" 
          $wpPath = "C:\Users\Public\wallpaper.jpg"
          $finalWpPath = "C:\Users\Public\branded_wallpaper.jpg"
          $code = @"
          using System.Runtime.InteropServices;
          public class Wallpaper {
              [DllImport("user32.dll", CharSet = CharSet.Auto)]
              public static extern int SystemParametersInfo(int uAction, int uParam, string lpvParam, int fuWinIni);
          }
          "@
          Add-Type -TypeDefinition $code -ErrorAction SilentlyContinue
          try {
              (New-Object System.Net.WebClient).DownloadFile($wpUrl, $wpPath)
              Add-Type -AssemblyName System.Drawing
              $img = [System.Drawing.Image]::FromFile($wpPath)
              $graphics = [System.Drawing.Graphics]::FromImage($img)
              $font = New-Object System.Drawing.Font("Arial", 45, [System.Drawing.FontStyle]::Bold)
              $brush = New-Object System.Drawing.SolidBrush([System.Drawing.Color]::White)
              $graphics.DrawString("MASTER: YUTA 複", $font, $brush, 60, ($img.Height - 180))
              $graphics.DrawString("Telegram: @JOY_100K", $font, $brush, 60, ($img.Height - 100))
              $img.Save($finalWpPath, [System.Drawing.Imaging.ImageFormat]::Jpeg)
              $graphics.Dispose(); $img.Dispose()
              [Wallpaper]::SystemParametersInfo(0x0014, 0, $finalWpPath, 0x01)
          } catch { Write-Host "Wallpaper skip" }

      - name: 📱 Telegram & GitHub Log Output
        run: |
          Write-Host "========================================="
          Write-Host "🚀 RDP LOGS FOR MASTER YUTA"
          Write-Host "IP: ${{ env.TAILSCALE_IP }}"
          Write-Host "User: MasterYuta"
          Write-Host "Pass: ${{ env.RDP_PASS }}"
          Write-Host "========================================="
          
          $htmlBody = "<b>💎 MASTER YUTA RDP V3 ONLINE</b>`n" +
                      "━━━━━━━━━━━━━━━━━━━━━━`n" +
                      "🌐 <b>IP:</b> <code>${{ env.TAILSCALE_IP }}</code>`n" +
                      "👤 <b>User:</b> <code>MasterYuta</code>`n" +
                      "🔑 <b>Pass:</b> <code>${{ env.RDP_PASS }}</code>`n" +
                      "🔋 <b>RAM:</b> ${{ env.TOTAL_RAM }}GB`n" +
                      "━━━━━━━━━━━━━━━━━━━━━━"
          $payload = @{ chat_id = "${{ secrets.TELEGRAM_CHAT_ID }}"; text = $htmlBody; parse_mode = "HTML" } | ConvertTo-Json
          Invoke-RestMethod -Uri "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" -Method Post -Body $payload -ContentType "application/json"

      - name: 🔄 Smart Keep-Alive
        run: |
          Add-Type -AssemblyName System.Windows.Forms
          $endTime = (Get-Date).AddMinutes(350)
          while ((Get-Date) -lt $endTime) {
              [System.Windows.Forms.Cursor]::Position = New-Object System.Drawing.Point((Get-Random -Max 800), (Get-Random -Max 600))
              Write-Host "Jarvis Active... IP: ${{ env.TAILSCALE_IP }} | Master: Yuta"
              Start-Sleep -Seconds 300
          }
          $token = "${{ secrets.GH_PAT }}"
          if ($token) {
              $auth = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes("${{ github.actor }}:$token"))
              curl -X POST -H "Authorization: Basic $auth" -H "Accept: application/vnd.github.v3+json" "https://api.github.com/repos/${{ github.repository }}/dispatches" -d "{\"event_type\": \"restart_rdp\"}"
          }
