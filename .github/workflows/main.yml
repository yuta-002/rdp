name: Windows Master CI - Ultra Pro V2 (Tailscale Edition)

on:
  workflow_dispatch:
  repository_dispatch:
    types: [restart_rdp]

jobs:
  build-and-test:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:
      - name: 🚀 Initialize High-Performance & Optimization
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force
          powercfg /s 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c
          netsh advfirewall firewall add rule name="RDP-Port" dir=in action=allow protocol=TCP localport=3389
          Restart-Service -Name TermService -Force

      - name: 👤 Create Master Admin & Info
        run: |
          $chars = (65..90) + (97..122) + (48..57) + (33, 35, 36, 37)
          $password = -join ($chars | Get-Random -Count 14 | ForEach-Object {[char]$_})
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          New-LocalUser -Name "TestAdmin" -Password $securePass -FullName "YUTA Master" -Description "Managed by @JOY_100K" -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "TestAdmin"
          echo "RDP_PASS=$password" >> $env:GITHUB_ENV
          echo "OS_INFO=$((Get-WmiObject Win32_OperatingSystem).Caption)" >> $env:GITHUB_ENV
          echo "CPU_INFO=$((Get-WmiObject Win32_Processor).Name)" >> $env:GITHUB_ENV
          $totalRam = [math]::Round((Get-CimInstance Win32_PhysicalMemory | Measure-Object Capacity -Sum).Sum / 1GB)
          echo "TOTAL_RAM=$totalRam" >> $env:GITHUB_ENV

      - name: 🛡️ Set Master Watermark & Master UI Tweaks
        run: |
          $regPath = "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System"
          Set-ItemProperty -Path $regPath -Name "legalnoticecaption" -Value "🚀 RDP MASTER: YUTA 複 (ユタ)" -Force
          Set-ItemProperty -Path $regPath -Name "legalnoticetext" -Value "Welcome, Master YUTA 複.`nTelegram: @JOY_100K`n`nTailscale Network Active!" -Force
          
          $oemInfo = "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\OEMInformation"
          if (!(Test-Path $oemInfo)) { New-Item -Path $oemInfo -Force }
          Set-ItemProperty -Path $oemInfo -Name "Manufacturer" -Value "YUTA Master Edition" -Force
          Set-ItemProperty -Path $oemInfo -Name "SupportURL" -Value "https://t.me/JOY_100K" -Force

          $regApps = "HKCU:\Software\Microsoft\Windows\CurrentVersion\Themes\Personalize"
          if (!(Test-Path $regApps)) { New-Item -Path $regApps -Force }
          Set-ItemProperty -Path $regApps -Name "AppsUseLightTheme" -Value 0 -Force
          Set-ItemProperty -Path $regApps -Name "SystemUsesLightTheme" -Value 0 -Force

      - name: 🌐 Setup Tailscale (VPN Tunnel)
        run: |
          # Tailscale MSI ইন্সটল করা হচ্ছে
          Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe" -OutFile "tailscale-setup.exe"
          Start-Process -FilePath ".\tailscale-setup.exe" -ArgumentList "/quiet /norestart" -Wait
          
          # Tailscale পাথ এনাবল করা
          $env:Path += ";C:\Program Files\Tailscale"
          
          # Tailscale লগইন এবং আপ করা (Secrets থেকে Auth Key ব্যবহার করে)
          tailscale up --authkey ${{ secrets.TAILSCALE_AUTH_KEY }} --hostname "YUTA-MASTER-RDP"
          
          # আইপি অ্যাড্রেস সংগ্রহ করা
          $tsIp = (tailscale ip -4).Trim()
          echo "TS_IP=$tsIp" >> $env:GITHUB_ENV
          Write-Host "Tailscale IP: $tsIp" -ForegroundColor Cyan

      - name: 🔊 Setup Master Voice & Welcome (Startup)
        run: |
          $startupFolder = "C:\ProgramData\Microsoft\Windows\Start Menu\Programs\StartUp"
          $voiceScript = @"
          Dim speaks, speech
          speaks = "Welcome back, Master YUTA. System is online. Tailscale VPN is active."
          Set speech = CreateObject("sapi.spvoice")
          speech.Speak speaks
          "@
          $voiceScript | Out-File "$startupFolder\WelcomeVoice.vbs" -Encoding utf8

          $msgScript = @"
          MsgBox "Welcome back, Master YUTA 複" & vbCrLf & "Network: Tailscale Private" & vbCrLf & "IP: $($env:TS_IP)", 64, "YUTA Master System"
          "@
          $msgScript | Out-File "$startupFolder\WelcomeMsg.vbs" -Encoding utf8

      - name: 📝 Generate Master Desktop Info
        run: |
          $details = @"
          =========================================
          👑 MASTER: YUTA 複 (ユタ)
          📱 TELEGRAM: @JOY_100K
          =========================================
          🌐 NETWORK: TAILSCALE VPN
          Address: $($env:TS_IP)
          User: TestAdmin
          Pass: $($env:RDP_PASS)
          =========================================
          "@
          $details | Out-File "C:\Users\Public\Desktop\MASTER_YUTA_INFO.txt" -Encoding utf8

          $profilePath = "$Home\Documents\WindowsPowerShell"
          if (!(Test-Path $profilePath)) { New-Item -ItemType Directory -Path $profilePath -Force }
          $banner = @"
          Write-Host "==========================================================" -ForegroundColor Cyan
          Write-Host "   🚀 WELCOME MASTER YUTA 複 (ユタ) - TAILSCALE V2" -ForegroundColor Yellow
          Write-Host "   📱 STATUS: VPN CONNECTED | MODE: SUPREME" -ForegroundColor Green
          Write-Host "==========================================================" -ForegroundColor Cyan
          "@
          $banner | Out-File "$profilePath\Microsoft.PowerShell_profile.ps1" -Encoding utf8

      - name: 🖼️ Set Master Wallpaper
        run: |
          $wpUrl = "https://i.imgur.com/G4lU8jL.jpg" 
          $wpPath = "C:\Users\Public\wallpaper.jpg"
          $finalWpPath = "C:\Users\Public\branded_wallpaper.jpg"
          $code = @"
          using System.Runtime.InteropServices;
          public class Wallpaper {
              [DllImport("user32.dll", CharSet = CharSet.Auto)]
              public static extern int SystemParametersInfo(int uAction, int uParam, string lpvParam, int fuWinIni);
          }
          "@
          Add-Type -TypeDefinition $code -ErrorAction SilentlyContinue
          try {
              $wc = New-Object System.Net.WebClient
              $wc.Headers.Add("User-Agent", "Mozilla/5.0")
              $wc.DownloadFile($wpUrl, $wpPath)
              Add-Type -AssemblyName System.Drawing
              $img = [System.Drawing.Image]::FromFile($wpPath)
              $graphics = [System.Drawing.Graphics]::FromImage($img)
              $font = New-Object System.Drawing.Font("Arial", 45, [System.Drawing.FontStyle]::Bold)
              $brush = New-Object System.Drawing.SolidBrush([System.Drawing.Color]::White)
              $graphics.DrawString("MASTER: YUTA 複", $font, $brush, 60, ($img.Height - 180))
              $graphics.DrawString("Telegram: @JOY_100K", $font, $brush, 60, ($img.Height - 100))
              $img.Save($finalWpPath, [System.Drawing.Imaging.ImageFormat]::Jpeg)
              $graphics.Dispose(); $img.Dispose()
              [Wallpaper]::SystemParametersInfo(0x0014, 0, $finalWpPath, 0x01)
          } catch {
              Write-Host "Wallpaper Error"
          }

      - name: 📱 Telegram Notification (Tailscale)
        run: |
          $htmlBody = "<b>🔒 TAILSCALE MASTER RDP BY YUTA 複</b>`n" +
                      "━━━━━━━━━━━━━━━━━━━━━━`n" +
                      "👤 <b>MASTER:</b> YUTA (@JOY_100K)`n" +
                      "🌐 <b>VPN IP:</b> <code>${{ env.TS_IP }}</code>`n" +
                      "👤 <b>USER:</b> <code>TestAdmin</code>`n" +
                      "🔑 <b>PASS:</b> <code>${{ env.RDP_PASS }}</code>`n`n" +
                      "🔋 <b>RAM:</b> ${{ env.TOTAL_RAM }}GB`n" +
                      "⏱️ <b>SESSION:</b> 6 Hours Auto-Restart`n" +
                      "━━━━━━━━━━━━━━━━━━━━━━"
          $payload = @{ chat_id = "${{ secrets.TELEGRAM_CHAT_ID }}"; text = $htmlBody; parse_mode = "HTML" } | ConvertTo-Json
          Invoke-RestMethod -Uri "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" -Method Post -Body $payload -ContentType "application/json"

      - name: 🔄 Smart Keep-Alive & Auto-Restart
        run: |
          Add-Type -AssemblyName System.Windows.Forms
          $endTime = (Get-Date).AddMinutes(350)
          while ((Get-Date) -lt $endTime) {
              [System.Windows.Forms.Cursor]::Position = New-Object System.Drawing.Point((Get-Random -Max 800), (Get-Random -Max 600))
              Write-Host "Running... MASTER: YUTA 複 | Tailscale Active"
              [System.GC]::Collect()
              Start-Sleep -Seconds 300
          }
          $token = "${{ secrets.GH_PAT }}"
          if ($token) {
              $auth = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes("${{ github.actor }}:$token"))
              curl -X POST -H "Authorization: Basic $auth" -H "Accept: application/vnd.github.v3+json" "https://api.github.com/repos/${{ github.repository }}/dispatches" -d "{\"event_type\": \"restart_rdp\"}"
          }
