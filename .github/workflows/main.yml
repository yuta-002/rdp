name: Windows CI Build Environment - Rimuru Edition

on:
  workflow_dispatch:
  repository_dispatch:
    types: [restart_rdp]

jobs:
  build-and-test:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:
      - name: Initialize Windows Test Environment
        run: |
          # RDP ও সিকিউরিটি কনফিগারেশন
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force
                           
          # পাওয়ার ও লক স্ক্রিন অপ্টিমাইজেশন
          powercfg -change -standby-timeout-ac 0
          powercfg -change -monitor-timeout-ac 0
          powercfg -change -hibernate-timeout-ac 0
          $regPath = "HKLM:\SOFTWARE\Policies\Microsoft\Windows\Personalization"
          if (-not (Test-Path $regPath)) { New-Item -Path $regPath -Force | Out-Null }
          Set-ItemProperty -Path $regPath -Name "NoLockScreen" -Value 1 -Force
          
          # Performance Boost
          powercfg /s 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c
          
          # Virtual RAM (PageFile) Fix
          Set-CimInstance -Query "Select * from Win32_ComputerSystem" -Property @{AutomaticManagedPagefile=$False}
          $pagefile = Get-CimInstance Win32_PageFileSetting
          if ($pagefile) { $pagefile | Remove-CimInstance }
          New-CimInstance -ClassName Win32_PageFileSetting -Property @{
              Name = "C:\pagefile.sys";
              InitialSize = [uint32]8192;
              MaximumSize = [uint32]16384
          }
          
          netsh advfirewall firewall delete rule name="Test-Env-Access"
          netsh advfirewall firewall add rule name="Test-Env-Access" dir=in action=allow protocol=TCP localport=3389
          Restart-Service -Name TermService -Force

      - name: Setup Test Administrator Account
        run: |
          Add-Type -AssemblyName System.Security
          $charSet = @{
              Upper   = [char[]](65..90); Lower = [char[]](97..122); Number = [char[]](48..57); 
              Special = ([char[]](33..47) + [char[]](58..64) + [char[]](91..96) + [char[]](123..126))
          }
          $rawPassword = @()
          $rawPassword += $charSet.Upper | Get-Random -Count 4
          $rawPassword += $charSet.Lower | Get-Random -Count 4
          $rawPassword += $charSet.Number | Get-Random -Count 4
          $rawPassword += $charSet.Special | Get-Random -Count 4
          $password = -join ($rawPassword | Sort-Object { Get-Random })
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          
          New-LocalUser -Name "TestAdmin" -Password $securePass -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "TestAdmin"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "TestAdmin"
          
          echo "RDP_PASS=$password" >> $env:GITHUB_ENV
          echo "OS_INFO=$((Get-WmiObject Win32_OperatingSystem).Caption)" >> $env:GITHUB_ENV
          echo "CPU_INFO=$((Get-WmiObject Win32_Processor).Name)" >> $env:GITHUB_ENV
          
          if (-not (Get-LocalUser -Name "TestAdmin")) { exit 1 }

      - name: 🖼️ Set Rimuru Tempest 4K Wallpaper & Branding
        run: |
          $wpUrl = "https://images6.alphacoders.com/985/985161.jpg"
          $wpPath = "C:\Windows\rimuru-branding.jpg"
          
          try {
            Invoke-WebRequest -Uri $wpUrl -OutFile $wpPath -ErrorAction Stop
            $code = @"
            using System.Runtime.InteropServices;
            public class Wallpaper {
              [DllImport("user32.dll", CharSet = CharSet.Auto)]
              public static extern int SystemParametersInfo(int uAction, int uParam, string lpvParam, int fuWinIni);
            }
"@
            Add-Type -TypeDefinition $code
            [Wallpaper]::SystemParametersInfo(0x0014, 0, $wpPath, 0x01)
          } catch {
            Write-Host "Wallpaper failed, skipping..."
          }
          "Owner: JOY_100K | Telegram: @JOY_100K" | Out-File "C:\Users\Public\Desktop\JOY_100K_INFO.txt"

      - name: 🎮 Install Chrome & BlueStacks 5
        run: |
          $chromeUrl = "https://dl.google.com/tag/s/appguid%3D%7B8A69D345-D564-463C-AFF1-A69D9E530F96%7D%26iid%3D%7B8D144A76-7A5E-44B4-8A66-86F6B2C8C67E%7D%26lang%3Den%26browser%3D4%26usagestats%3D0%26appname%3DGoogle%2520Chrome%26needsadmin%3Dtrue%26ap%3Dx64-stable-statsdef_1%26installdataindex%3Ddefaultbrowser/update2/installers/ChromeSetup.exe"
          Invoke-WebRequest -Uri $chromeUrl -OutFile "$env:TEMP\ChromeSetup.exe"
          Start-Process "$env:TEMP\ChromeSetup.exe" -ArgumentList "/silent", "/install" -Wait
          
          $bsUrl = "https://ak-build.bluestacks.com/public/app-player/windows/nxt/5.21.210.1023/52e72404e330f8981df1066063e5229c/BlueStacksMicroInstaller_5.21.210.1023_native.exe"
          Invoke-WebRequest -Uri $bsUrl -OutFile "$env:TEMP\BSInstaller.exe"
          Start-Process "$env:TEMP\BSInstaller.exe" -ArgumentList "--unattended", "--notab", "--forced" -Wait

      - name: 🔗 Tailscale Network Setup
        run: |
          Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi" -OutFile "ts.msi"
          Start-Process msiexec.exe -ArgumentList "/i", "ts.msi", "/quiet", "/norestart" -Wait
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=rimuru-rdp-${{ github.run_id }}
          $tsIP = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV

      - name: 📱 Notify via Telegram
        run: |
          $text = @"
          💙 *RIMURU TEMPEST RDP ONLINE*
          ━━━━━━━━━━━━━━━━━━━━━━
          👤 *OWNER:* JOY_100K
          📱 *TELEGRAM:* @JOY_100K
          
          🖥️ *SPECS:* ${{ env.CPU_INFO }} | 7GB RAM
          🌐 *IP:* `${{ env.TAILSCALE_IP }}`
          🔑 *USER:* `TestAdmin`
          🔑 *PASS:* `${{ env.RDP_PASS }}`
          ━━━━━━━━━━━━━━━━━━━━━━
          🎮 BlueStacks & Chrome: *Installed* ✅
          🌀 Theme: *Rimuru Tempest 4K* ✅
          ━━━━━━━━━━━━━━━━━━━━━━
          🛑 *DELETE RDP:*
          To terminate, go to GitHub Actions and select 'Cancel Workflow'.
          🔗 [Action Link](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          "@
          Invoke-RestMethod -Uri "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" -Method Post -Body (@{ chat_id = "${{ secrets.TELEGRAM_CHAT_ID }}"; text = $text; parse_mode = "Markdown" } | ConvertTo-Json) -ContentType "application/json"

      - name: 🔄 Keep Alive & Auto Restart
        run: |
          $limit = (Get-Date).AddMinutes(350)
          while ((Get-Date) -lt $limit) {
              Write-Host "Rimuru RDP | JOY_100K | Status: Running..."
              $pos = [System.Windows.Forms.Cursor]::Position
              [System.Windows.Forms.Cursor]::Position = New-Object System.Drawing.Point(($pos.X + 1), ($pos.Y + 1))
              Start-Sleep -Seconds 300
          }
          
          $auth = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes("${{ github.actor }}:${{ secrets.GH_PAT }}"))
          curl -X POST -H "Authorization: Basic $auth" -H "Accept: application/vnd.github.v3+json" https://api.github.com/repos/${{ github.repository }}/dispatches -d "{\"event_type\": \"restart_rdp\"}"
