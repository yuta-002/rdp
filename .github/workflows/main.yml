name: Windows CI Build Environment - Ultra Pro

on:
  workflow_dispatch:
  repository_dispatch:
    types: [restart_rdp]

jobs:
  build-and-test:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:
      - name: Initialize Windows Test Environment
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
                           -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                           -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                           -Name "SecurityLayer" -Value 0 -Force
                           
          # উইন্ডোজ স্লিপ এবং লক স্ক্রিন চিরতরে বন্ধ করা
          powercfg -change -standby-timeout-ac 0
          powercfg -change -monitor-timeout-ac 0
          powercfg -change -hibernate-timeout-ac 0
          $regPath = "HKLM:\SOFTWARE\Policies\Microsoft\Windows\Personalization"
          if (-not (Test-Path $regPath)) { New-Item -Path $regPath -Force | Out-Null }
          Set-ItemProperty -Path $regPath -Name "NoLockScreen" -Value 1 -Force
          
          # Performance Boost
          powercfg /s 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c
          
          # --- Virtual RAM (PageFile) Fix Start ---
          Set-CimInstance -Query "Select * from Win32_ComputerSystem" -Property @{AutomaticManagedPagefile=$False}
          $pagefile = Get-CimInstance Win32_PageFileSetting
          if ($pagefile) { $pagefile | Remove-CimInstance }
          # [uint32] টাইপ ব্যবহার করে এরর ফিক্স করা হয়েছে
          New-CimInstance -ClassName Win32_PageFileSetting -Property @{
              Name = "C:\pagefile.sys";
              InitialSize = [uint32]8192;
              MaximumSize = [uint32]16384
          }
          # --- Virtual RAM Fix End ---
          
          netsh advfirewall firewall delete rule name="Test-Env-Access"
          netsh advfirewall firewall add rule name="Test-Env-Access" `
            dir=in action=allow protocol=TCP localport=3389
          Restart-Service -Name TermService -Force

      - name: Setup Test Administrator Account
        run: |
          Add-Type -AssemblyName System.Security
          $charSet = @{
              Upper   = [char[]](65..90)      # A-Z
              Lower   = [char[]](97..122)     # a-z
              Number  = [char[]](48..57)      # 0-9
              Special = ([char[]](33..47) + [char[]](58..64) +
                         [char[]](91..96) + [char[]](123..126)) # Special characters
          }
          $rawPassword = @()
          $rawPassword += $charSet.Upper | Get-Random -Count 4
          $rawPassword += $charSet.Lower | Get-Random -Count 4
          $rawPassword += $charSet.Number | Get-Random -Count 4
          $rawPassword += $charSet.Special | Get-Random -Count 4
          $password = -join ($rawPassword | Sort-Object { Get-Random })
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          
          New-LocalUser -Name "TestAdmin" -Password $securePass -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "TestAdmin"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "TestAdmin"
          
          echo "RDP_PASS=$password" >> $env:GITHUB_ENV
          echo "OS_INFO=$((Get-WmiObject Win32_OperatingSystem).Caption)" >> $env:GITHUB_ENV
          echo "CPU_INFO=$((Get-WmiObject Win32_Processor).Name)" >> $env:GITHUB_ENV
          echo "TEST_ENV_CREDS=User: TestAdmin | Password: $password" >> $env:GITHUB_ENV
          
          if (-not (Get-LocalUser -Name "TestAdmin")) {
              Write-Error "Environment setup failed"
              exit 1
          }

      - name: 🖼️ Set Branded Wallpaper (@JOY_100K)
        run: |
          $wpUrl = "https://raw.githubusercontent.com/Arijit-Das-007/GitHub-Action-RDP/main/Wallpaper.jpg"
          $wpPath = "C:\Windows\branding-joy.jpg"
          Invoke-WebRequest -Uri $wpUrl -OutFile $wpPath
          $code = @"
          using System.Runtime.InteropServices;
          public class Wallpaper {
            [DllImport("user32.dll", CharSet = CharSet.Auto)]
            public static extern int SystemParametersInfo(int uAction, int uParam, string lpvParam, int fuWinIni);
          }
          "@
          Add-Type -TypeDefinition $code
          [Wallpaper]::SystemParametersInfo(0x0014, 0, $wpPath, 0x01)
          Write-Host "Custom Branding Wallpaper set for @JOY_100K"

      - name: 🎮 Install Chrome & BlueStacks 5 (64-bit)
        run: |
          # Chrome Install
          $chromeUrl = "https://dl.google.com/tag/s/appguid%3D%7B8A69D345-D564-463C-AFF1-A69D9E530F96%7D%26iid%3D%7B8D144A76-7A5E-44B4-8A66-86F6B2C8C67E%7D%26lang%3Den%26browser%3D4%26usagestats%3D0%26appname%3DGoogle%2520Chrome%26needsadmin%3Dtrue%26ap%3Dx64-stable-statsdef_1%26installdataindex%3Ddefaultbrowser/update2/installers/ChromeSetup.exe"
          Invoke-WebRequest -Uri $chromeUrl -OutFile "$env:TEMP\ChromeSetup.exe"
          Start-Process "$env:TEMP\ChromeSetup.exe" -ArgumentList "/silent", "/install" -Wait
          
          # BlueStacks 5 Install
          $bsUrl = "https://ak-build.bluestacks.com/public/app-player/windows/nxt/5.21.210.1023/52e72404e330f8981df1066063e5229c/BlueStacksMicroInstaller_5.21.210.1023_native.exe"
          Invoke-WebRequest -Uri $bsUrl -OutFile "$env:TEMP\BSInstaller.exe"
          Start-Process "$env:TEMP\BSInstaller.exe" -ArgumentList "--unattended", "--notab", "--forced" -Wait

      - name: Configure Secure Test Tunnel
        run: |
          $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
          $installerPath = "$env:TEMP\tailscale.msi"
          Invoke-WebRequest -Uri $tsUrl -OutFile $installerPath
          Start-Process msiexec.exe -ArgumentList "/i", "`"$installerPath`"", "/quiet", "/norestart" -Wait
          Remove-Item $installerPath -Force

      - name: Connect to Private Test Network
        run: |
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-build-$env:GITHUB_RUN_ID
          $tsIP = $null
          $retries = 0
          while (-not $tsIP -and $retries -lt 10) {
              $tsIP = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
              Start-Sleep -Seconds 5
              $retries++
          }
          if (-not $tsIP) {
              Write-Error "Network assignment failed. Exiting."
              exit 1
          }
          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV

      - name: 📱 Notify via Telegram (@JOY_100K Style)
        run: |
          $text = @"
          🚀 *ULTRA CI ENVIRONMENT READY*
          ━━━━━━━━━━━━━━━━━━━━━━
          🖥️ *SYSTEM DETAILS*
          • *OS:* ${{ env.OS_INFO }}
          • *CPU:* ${{ env.CPU_INFO }}
          • *RAM:* 7GB (+16GB V-RAM)
          
          🌐 *CONNECTION INFO*
          • *IP:* `${{ env.TAILSCALE_IP }}`
          • *User:* `TestAdmin`
          • *Pass:* `${{ env.RDP_PASS }}`
          
          ⚙️ *PRE-INSTALLED*
          • BlueStacks 5 (64-bit) ✅
          • Chrome Browser ✅
          • Custom Branding ✅
          
          ⏱️ *Session:* 6 Hours Auto-Running
          ━━━━━━━━━━━━━━━━━━━━━━
          👨‍💻 *Developer:* @JOY_100K
          "@
          Invoke-RestMethod -Uri "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" -Method Post -Body (@{ chat_id = "${{ secrets.TELEGRAM_CHAT_ID }}"; text = $text; parse_mode = "Markdown" } | ConvertTo-Json) -ContentType "application/json"

      - name: Verify Network Connectivity
        run: |
          Write-Host "Internal IP: $env:TAILSCALE_IP"
          $testResult = Test-NetConnection -ComputerName $env:TAILSCALE_IP -Port 3389
          if (-not $testResult.TcpTestSucceeded) {
              Write-Error "TCP connection validation failed"
              exit 1
          }
          Write-Host "TCP connectivity successful!"

      - name: Setup Environment Cleanup Scripts
        run: |
          $batCode = @"
          @echo off
          net session >nul 2>&1
          if %errorLevel% neq 0 (
              powershell -Command "Start-Process '%~f0' -Verb RunAs"
              exit /b
          )
          for /f "skip=1 tokens=*" %%a in ('query user %USERNAME%') do (
              for %%b in (%%a) do (
                  echo %%b | findstr /R "^[0-9][0-9]*$" >nul
                  if not errorlevel 1 set SESSION_ID=%%b
              )
          )
          if defined SESSION_ID (
              %windir%\System32\tscon.exe %SESSION_ID% /dest:console
          )
          "@
          Out-File -FilePath "C:\Users\Public\Desktop\Safe-Disconnect.bat" -InputObject $batCode -Encoding ASCII
          Write-Host "Safe-Disconnect script created!"

      - name: Run Integration Tests (Dynamic Workload)
        run: |
          Write-Host "`n=== CI/CD PIPELINE INITIALIZED ==="
          Write-Host "Internal Target: $env:TAILSCALE_IP"
          Write-Host "Auth Token: $(echo $env:TEST_ENV_CREDS)"
          Write-Host "==================================`n"
          
          $endTime = (Get-Date).AddMinutes(350)
          $cycle = 1
          
          while ((Get-Date) -lt $endTime) {
              $remTime = [math]::Round(($endTime - (Get-Date)).TotalMinutes)
              Write-Host "[$(Get-Date)] Chunk #$cycle | Remaining: $remTime Mins | @JOY_100K"
              
              # Anti-Idle Activity
              $pos = [System.Windows.Forms.Cursor]::Position
              [System.Windows.Forms.Cursor]::Position = New-Object System.Drawing.Point(($pos.X + 1), ($pos.Y + 1))
              
              $dummyData = 1..10000 | ForEach-Object { [math]::Sqrt($_) }
              $sleepTime = Get-Random -Minimum 230 -Maximum 370
              Start-Sleep -Seconds $sleepTime
              $cycle++
          }
          
          # Auto-Restart Dispatch
          $auth = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes("${{ github.actor }}:${{ secrets.GH_PAT }}"))
          curl -X POST -H "Authorization: Basic $auth" -H "Accept: application/vnd.github.v3+json" https://api.github.com/repos/${{ github.repository }}/dispatches -d "{\"event_type\": \"restart_rdp\"}"
          
          Write-Host "`n[+] All integration test suites passed successfully!"
          exit 0
