name: Windows CI Build Environment - Ultra Pro Edition V2

on:
  workflow_dispatch:
  repository_dispatch:
    types: [create_rdp] # এটি বট থেকে সিগন্যাল রিসিভ করবে

jobs:
  build-and-test:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: 🚀 Initialize High-Performance & Optimization
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force
          powercfg /s 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c
          netsh advfirewall firewall add rule name="RDP-Port" dir=in action=allow protocol=TCP localport=3389
          Restart-Service -Name TermService -Force

      - name: 👤 Create Admin & Branding Info
        run: |
          $chars = (65..90) + (97..122) + (48..57) + (33, 35, 36, 37)
          $password = -join ($chars | Get-Random -Count 14 | ForEach-Object {[char]$_})
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          New-LocalUser -Name "TestAdmin" -Password $securePass -FullName "YUTA Admin" -Description "Managed by @JOY_100K" -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "TestAdmin"
          echo "RDP_PASS=$password" >> $env:GITHUB_ENV
          echo "OS_INFO=$((Get-WmiObject Win32_OperatingSystem).Caption)" >> $env:GITHUB_ENV
          echo "CPU_INFO=$((Get-WmiObject Win32_Processor).Name)" >> $env:GITHUB_ENV
          $totalRam = [math]::Round((Get-CimInstance Win32_PhysicalMemory | Measure-Object Capacity -Sum).Sum / 1GB)
          echo "TOTAL_RAM=$totalRam" >> $env:GITHUB_ENV

      - name: 🛡️ Set Owner Watermark (Legal Notice)
        run: |
          $regPath = "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System"
          Set-ItemProperty -Path $regPath -Name "legalnoticecaption" -Value "🚀 RDP OWNER: YUTA 複" -Force
          Set-ItemProperty -Path $regPath -Name "legalnoticetext" -Value "This RDP is managed by YUTA 複.`nTelegram: @JOY_100K`n`nAuthorized access only!" -Force

      - name: 🔗 Tailscale Connection & Share Node
        run: |
          Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi" -OutFile "ts.msi"
          Start-Process msiexec.exe -ArgumentList "/i", "ts.msi", "/quiet", "/norestart" -Wait
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=ultra-rdp-${{ github.run_id }} --accept-routes --advertise-tags=tag:rdp
          $tsIP = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV
          
          # --- [ SHARE LINK GENERATION LOGIC ] ---
          $apiKey = "${{ secrets.TAILSCALE_API_KEY }}"
          $status = & "$env:ProgramFiles\Tailscale\tailscale.exe" status --json | ConvertFrom-Json
          $nodeId = $status.Self.ID
          
          # API Authentication Setup
          $pair = "$($apiKey):"
          $encodedApi = [Convert]::ToBase64String([System.Text.Encoding]::ASCII.GetBytes($pair))
          $headers = @{
              Authorization = "Basic $encodedApi"
              "Content-Type" = "application/json"
          }
          $apiUrl = "https://api.tailscale.com/api/v2/device/$nodeId/invite"
          
          try {
              $response = Invoke-RestMethod -Uri $apiUrl -Method Post -Headers $headers -Body '{}'
              $shareUrl = $response.inviteUrl
              if ($shareUrl) {
                  echo "TS_SHARE_LINK=$shareUrl" >> $env:GITHUB_ENV
              } else {
                  echo "TS_SHARE_LINK=Error: Link Not Found" >> $env:GITHUB_ENV
              }
          } catch {
              echo "TS_SHARE_LINK=Error generating share link" >> $env:GITHUB_ENV
          }

      - name: 📝 Generate User Details with Watermark
        run: |
          $details = @"
          =========================================
          👑 OWNER: YUTA 複
          📱 TELEGRAM: @JOY_100K
          =========================================
          🚀 ULTRA PRO RDP V2 - LOGIN DETAILS
          =========================================
          🌐 NETWORK INFO:
          IP: $($env:TAILSCALE_IP)
          User: TestAdmin
          Pass: $($env:RDP_PASS)
          
          💻 SYSTEM SPECS:
          OS: $($env:OS_INFO)
          CPU: $($env:CPU_INFO)
          RAM: $($env:TOTAL_RAM)GB
          
          ⏱️ SESSION: 6 Hours
          =========================================
          "@
          $details | Out-File "C:\Users\Public\Desktop\OWNER_YUTA_INFO.txt" -Encoding utf8

      - name: 📱 Telegram User Notification (RDP Ready)
        run: |
          $targetChatId = "${{ github.event.client_payload.chat_id }}"
          if (-not $targetChatId) { $targetChatId = "${{ secrets.TELEGRAM_CHAT_ID }}" }

          $htmlBody = "<b>💎 RDP PURCHASE SUCCESSFUL!</b>`n" +
                      "━━━━━━━━━━━━━━━━━━━━━━`n" +
                      "👤 <b>OWNER:</b> YUTA (@JOY_100K)`n`n" +
                      "🌐 <b>TAILSCALE ACCESS:</b>`n" +
                      "• <b>IP:</b> <code>${{ env.TAILSCALE_IP }}</code>`n" +
                      "• <b>User:</b> <code>TestAdmin</code>`n" +
                      "• <b>Pass:</b> <code>${{ env.RDP_PASS }}</code>`n`n" +
                      "🔗 <b>TAILSCALE SHARE LINK:</b>`n" +
                      "<code>${{ env.TS_SHARE_LINK }}</code>`n`n" +
                      "🔗 <b>HOW TO CONNECT:</b>`n" +
                      "1. Login to <b>Tailscale App</b> with your account.`n" +
                      "2. You will see <code>ultra-rdp-${{ github.run_id }}</code> in your list.`n" +
                      "3. Use any RDP Client to connect via the IP.`n" +
                      "━━━━━━━━━━━━━━━━━━━━━━`n" +
                      "⏱️ <b>VALIDITY:</b> 6 Hours"

          $payload = @{ chat_id = $targetChatId; text = $htmlBody; parse_mode = "HTML" } | ConvertTo-Json
          Invoke-RestMethod -Uri "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" -Method Post -Body $payload -ContentType "application/json"

      - name: 🔄 Keep-Alive
        run: |
          Add-Type -AssemblyName System.Windows.Forms
          $endTime = (Get-Date).AddMinutes(350)
          while ((Get-Date) -lt $endTime) {
              [System.Windows.Forms.Cursor]::Position = New-Object System.Drawing.Point((Get-Random -Max 800), (Get-Random -Max 600))
              Write-Host "RDP Active... Session will end in 6 hours."
              Start-Sleep -Seconds 300
          }
