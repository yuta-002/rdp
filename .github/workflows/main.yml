name: Windows CI Build Environment - Ultra Pro Edition

on:
  workflow_dispatch:
  repository_dispatch:
    types: [restart_rdp]

jobs:
  build-and-test:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:
      - name: 🚀 Initialize High-Performance Environment
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force
                           
          powercfg -change -standby-timeout-ac 0
          powercfg -change -monitor-timeout-ac 0
          powercfg -change -hibernate-timeout-ac 0
          $regPath = "HKLM:\SOFTWARE\Policies\Microsoft\Windows\Personalization"
          if (-not (Test-Path $regPath)) { New-Item -Path $regPath -Force | Out-Null }
          Set-ItemProperty -Path $regPath -Name "NoLockScreen" -Value 1 -Force
          
          powercfg /s 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c
          
          Set-CimInstance -Query "Select * from Win32_ComputerSystem" -Property @{AutomaticManagedPagefile=$False}
          $pagefile = Get-CimInstance Win32_PageFileSetting
          if ($pagefile) { $pagefile | Remove-CimInstance }
          New-CimInstance -ClassName Win32_PageFileSetting -Property @{
              Name = "C:\pagefile.sys";
              InitialSize = [uint32]8192;
              MaximumSize = [uint32]16384
          }
          
          netsh advfirewall firewall add rule name="RDP-Port" dir=in action=allow protocol=TCP localport=3389
          Restart-Service -Name TermService -Force

      - name: 👤 Create Admin & Branding
        run: |
          Add-Type -AssemblyName System.Security
          $password = -join ((65..90) + (97..122) + (48..57) | Get-Random -Count 12 | ForEach-Object {[char]$_})
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          
          New-LocalUser -Name "TestAdmin" -Password $securePass -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "TestAdmin"
          
          echo "RDP_PASS=$password" >> $env:GITHUB_ENV
          echo "OS_INFO=$((Get-WmiObject Win32_OperatingSystem).Caption)" >> $env:GITHUB_ENV
          echo "CPU_INFO=$((Get-WmiObject Win32_Processor).Name)" >> $env:GITHUB_ENV

      - name: 🖼️ Set Anime Wallpaper
        run: |
          $wpUrl = "https://images6.alphacoders.com/985/985161.jpg"
          $wpPath = "C:\Windows\branding-wp.jpg"
          try {
            Invoke-WebRequest -Uri $wpUrl -OutFile $wpPath -ErrorAction Stop
            $code = @"
            using System.Runtime.InteropServices;
            public class Wallpaper {
              [DllImport("user32.dll", CharSet = CharSet.Auto)]
              public static extern int SystemParametersInfo(int uAction, int uParam, string lpvParam, int fuWinIni);
            }
"@
            Add-Type -TypeDefinition $code
            [Wallpaper]::SystemParametersInfo(0x0014, 0, $wpPath, 0x01)
          } catch { Write-Host "Wallpaper skip" }
          "Welcome to Ultra Pro Build Environment | Managed by @JOY_100K" | Out-File "C:\Users\Public\Desktop\READ_ME.txt"

      - name: 🎮 Install Pro Tools
        run: |
          Invoke-WebRequest -Uri "https://dl.google.com/chrome/install/latest/chrome_installer.exe" -OutFile "chrome.exe"
          Start-Process "chrome.exe" -ArgumentList "/silent", "/install" -Wait
          
          Invoke-WebRequest -Uri "https://ak-build.bluestacks.com/public/app-player/windows/nxt/5.21.210.1023/52e72404e330f8981df1066063e5229c/BlueStacksMicroInstaller_5.21.210.1023_native.exe" -OutFile "BSInstaller.exe"
          Start-Process "BSInstaller.exe" -ArgumentList "--unattended", "--notab", "--forced" -Wait

      - name: 🔗 Tailscale Setup
        run: |
          Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi" -OutFile "ts.msi"
          Start-Process msiexec.exe -ArgumentList "/i", "ts.msi", "/quiet", "/norestart" -Wait
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=ultra-rdp-${{ github.run_id }}
          $tsIP = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV

      - name: 📱 Telegram Notification
        run: |
          $text = @"
          🚀 *ULTRA PRO RDP ONLINE*
          ━━━━━━━━━━━━━━━━━━━━━━
          👤 *OWNER:* JOY_100K
          💻 *OS:* ${{ env.OS_INFO }}
          🧠 *CPU:* ${{ env.CPU_INFO }}
          🔋 *RAM:* 7GB + 16GB V-RAM
          
          🌐 *NETWORK INFO:*
          IP: `${{ env.TAILSCALE_IP }}`
          User: `TestAdmin`
          Pass: `${{ env.RDP_PASS }}`
          
          🛠️ *INSTALLED:*
          ✅ Chrome Browser
          ✅ BlueStacks 5 (Pro Edition)
          ✅ Rimuru Tempest 4K Theme
          
          ⏱️ *SESSION:* 6 Hours Auto-Restart
          ━━━━━━━━━━━━━━━━━━━━━━
          🛑 *DELETE:* [Cancel Workflow](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          "@
          $body = @{ chat_id = "${{ secrets.TELEGRAM_CHAT_ID }}"; text = $text; parse_mode = "Markdown" } | ConvertTo-Json
          Invoke-RestMethod -Uri "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" -Method Post -Body $body -ContentType "application/json"

      - name: 🔄 Continuous Workload & Keep-Alive
        run: |
          Add-Type -AssemblyName System.Windows.Forms
          $endTime = (Get-Date).AddMinutes(350)
          while ((Get-Date) -lt $endTime) {
              $rem = [math]::Round(($endTime - (Get-Date)).TotalMinutes)
              Write-Host "Running... Time Left: $rem min | Brand: @JOY_100K"
              
              # Mouse Movement Fix (Anti-Idle)
              [System.Windows.Forms.Cursor]::Position = New-Object System.Drawing.Point((Get-Random -Max 500), (Get-Random -Max 500))
              
              Start-Sleep -Seconds 300
          }
          
          # Fixed Auto Restart Trigger
          $token = "${{ secrets.GH_PAT }}"
          $user = "${{ github.actor }}"
          $pair = "$($user):$($token)"
          $encoded = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes($pair))
          $authHeader = "Basic $encoded"
          
          curl -X POST -H "Authorization: $authHeader" -H "Accept: application/vnd.github.v3+json" "https://api.github.com/repos/${{ github.repository }}/dispatches" -d "{\"event_type\": \"restart_rdp\"}"