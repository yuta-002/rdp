name: YUTA-PRO-V3

on:
  workflow_dispatch:

jobs:
  automation:
    runs-on: ubuntu-latest
    timeout-minutes: 3600

    steps:
      - name: 📥 Restore WorkData
        uses: actions/cache@v4
        with:
          path: /home/yuta/WorkData
          key: yuta-data-${{ github.run_id }}
          restore-keys: yuta-data-

      - name: 🛰️ System Setup
        run: |
          sudo hostnamectl set-hostname YUTA-PRO
          sudo useradd -m -s /bin/bash yuta || true
          sudo usermod -aG sudo yuta
          
          # Generate Random Password
          RAND_PASS=$(openssl rand -base64 9 | tr -d /=+ | cut -c1-8)
          echo "PASS=$RAND_PASS" >> $GITHUB_ENV
          echo "yuta:$RAND_PASS" | sudo chpasswd
          echo "runner:$RAND_PASS" | sudo chpasswd
          
          # Install Desktop & Tools
          sudo apt update
          sudo apt install -y xfce4 xfce4-goodies xrdp adb openjdk-17-jdk python3-pip chromium-browser
          sudo adduser xrdp ssl-cert
          echo "startxfce4" | sudo tee /home/yuta/.xsession
          sudo chown yuta:yuta /home/yuta/.xsession
          sudo systemctl restart xrdp
          
          # WorkData Folder Setup
          sudo mkdir -p /home/yuta/WorkData
          sudo chown -R yuta:yuta /home/yuta/WorkData

      - name: 📱 Android Setup
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O sdk.zip
          unzip -q sdk.zip -d $HOME/android-sdk/cmdline-tools
          mv $HOME/android-sdk/cmdline-tools/cmdline-tools $HOME/android-sdk/cmdline-tools/latest
          
          export ANDROID_HOME=$HOME/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/emulator:$ANDROID_HOME/platform-tools
          
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "system-images;android-30;google_apis;x86_64" "emulator"
          echo "no" | $ANDROID_HOME/cmdline-tools/latest/bin/avdmanager create avd -n "YUTA_V3" -k "system-images;android-30;google_apis;x86_64" --force

      - name: 🔗 Tailscale & Notify
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=yuta-rdp
          IP=$(tailscale ip -4)
          
          # Send Telegram Message
          MSG="<b>💎 YUTA PRO V3 LIVE</b>%0A👤 User: <code>yuta</code>%0A🔑 Pass: <code>${{ env.PASS }}</code>%0A🌐 IP: <code>$IP</code>"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}&text=$MSG&parse_mode=HTML"

      - name: 🔄 Keep-Alive
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          nohup $ANDROID_HOME/emulator/emulator -avd YUTA_V3 -no-audio -no-window -gpu swiftshader_indirect > /dev/null 2>&1 &
          echo "🚀 RDP is Ready!"
          timeout 355m bash -c 'while true; do echo "Active | Pass: ${{ env.PASS }}"; sleep 300; done'
